<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <style>
      .bg { fill: #ec4899; }
      .hand-sec {
        transform-origin: 16px 20px;
        animation: tick 60s steps(60, end) infinite;
      }
      .hand-min {
        transform-origin: 16px 20px;
        animation: sweep 3600s linear infinite;
      }
      .pulse {
        transform-origin: 16px 20px;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes tick {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes sweep {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }
    </style>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" class="bg"/>

  <!-- Subtle inner glow ring -->
  <rect width="32" height="32" rx="7" fill="white" fill-opacity="0.08"/>

  <!-- Crown / top bar -->
  <path d="M11 6h10" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Stem from crown to body -->
  <path d="M16 6v3" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Side start-button -->
  <path d="M23 14l1.4-1.4" stroke="white" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Clock body -->
  <circle cx="16" cy="20" r="8.5" fill="white" fill-opacity="0.15" stroke="white" stroke-width="1.8"/>

  <!-- Minute hand (slow, smooth) -->
  <g class="hand-min">
    <line x1="16" y1="20" x2="16" y2="13.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Second hand (fast, ticking) -->
  <g class="hand-sec">
    <line x1="16" y1="20" x2="20.5" y2="16" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Center dot -->
  <circle cx="16" cy="20" r="1.2" fill="white" class="pulse"/>
</svg>
